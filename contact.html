            <!-- Page content-->
            <section class="py-5">
                <div class="container px-5">
                    <!-- Contact form-->
                    <div class="bg-light rounded-4 py-5 px-4 px-md-5">
                        <div class="text-center mb-5">
                            <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i class="bi bi-envelope"></i></div>
                            <h1 class="fw-bolder">¿Hablamos?</h1>
                            <p class="lead fw-normal text-muted mb-0">Si quieres saber algo más sobre mi trayectoria o mis proyectos, escríbeme y te respondo pronto</p>
                        </div>
                        <div class="row gx-5 justify-content-center">
                            <div class="col-lg-8 col-xl-6">
                                <form id="contactForm" action="https://formspree.io/f/mrejljvn" method="POST">
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="name" name="nombre" type="text" placeholder="Escribe tu nombre..." required />
                                        <label for="name">Nombre completo</label>
                                    </div>
                                    
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="email" name="email" type="email" placeholder="nombre@ejemplo.com" required />
                                        <label for="email">Correo electrónico</label>
                                    </div>
                                    
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="phone" name="telefono" type="tel" placeholder="600 000 000" />
                                        <label for="phone">Teléfono de contacto</label>
                                    </div>
                                    
                                    <div class="form-floating mb-3">
                                        <textarea class="form-control" id="message" name="mensaje" placeholder="Cuéntame en qué puedo ayudarte..." style="height: 10rem" required></textarea>
                                        <label for="message">Mensaje</label>
                                    </div>

                                    <div class="d-grid">
                                        <button class="btn btn-primary btn-lg" type="submit">Enviar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
